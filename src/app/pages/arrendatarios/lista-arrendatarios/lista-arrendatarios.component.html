<div [@routeAnimation] class="card card--panel perm-wrapper">
  <header class="perm-head" role="region" aria-label="Sección: Arrendatarios">
    <div class="perm-head__icon" aria-hidden="true">
      <mat-icon>storefront</mat-icon>
    </div>

    <div class="perm-head__text">
      <span class="eyebrow">Sección</span>
      <h2>Arrendatarios</h2>
    </div>

    <nav class="perm-head__crumbs" aria-label="Ruta">
      <span class="crumb">Operación</span>
      <span class="sep">/</span>
      <span class="crumb active">Arrendatarios</span>
    </nav>
  </header>

  <div class="surface">
    <div class="d-flex flex-wrap gap-10 justify-content-end w-100">
      <div *appHasPermission="'3'">
        <button (click)="agregarArrendatario()" mat-flat-button class="bg-secondary">
          <i class="fa fa-plus"></i> Agregar
        </button>
      </div>
      <button (click)="limpiarVista()" mat-flat-button class="bg-success">
        <i class="fa fa-eraser"></i>
        Limpiar
      </button>
      <button (click)="toggleExpandGroups()" mat-flat-button class="bg-warn">
        <i [class]="autoExpandAllGroups ? 'fa fa-expand' : 'fa fa-compress'" aria-hidden="true"></i>
        {{ autoExpandAllGroups ? ' Contraer Grupos' : ' Expandir Grupos' }}
      </button>
    </div>

    <div class="mt-3">
      <dx-data-grid #dataGridRef id="gridArrendatariosLocales" [dataSource]="rows" [keyExpr]="'idLocal'"
        [showBorders]="true" [showRowLines]="true" [showColumnLines]="true" [rowAlternationEnabled]="true"
        [columnAutoWidth]="true" [wordWrapEnabled]="true">
        <dxo-search-panel [visible]="true" [width]="260" placeholder="Buscar..."></dxo-search-panel>
        <dxo-header-filter [visible]="true"></dxo-header-filter>
        <dxo-filter-row [visible]="true"></dxo-filter-row>
        <dxo-paging [pageSize]="15"></dxo-paging>
        <dxo-pager [visible]="true" [showPageSizeSelector]="true" [allowedPageSizes]="[20]"
          [showInfo]="true"></dxo-pager>

        <dxi-column caption="Acciones" cellTemplate="acciones" alignment="center" *appHasPermission="['2', '4']"
          [width]="150"></dxi-column>
        <dxi-column alignment="center" dataField="inmueble" caption="Inmueble" [minWidth]="220"></dxi-column>
        <dxi-column alignment="center" dataField="local" caption="Local" [width]="160"></dxi-column>
        <dxi-column alignment="center" dataField="nivel" caption="Nivel" [width]="140"></dxi-column>
        <dxi-column alignment="center" dataField="superficieM2" caption="Superficie (m²)" dataType="number"
          format="#,##0.##" alignment="right" [width]="150"></dxi-column>
        <dxi-column alignment="center" dataField="estado" caption="Estado" [width]="120"></dxi-column>
        <dxi-column alignment="center" dataField="giroActividad" caption="Giro" [minWidth]="180"></dxi-column>
        <dxi-column alignment="center" dataField="mensualidadMxn" caption="Mensualidad (MXN)" dataType="number"
          format="currency" alignment="right" [width]="180"></dxi-column>
        <dxi-column alignment="center" dataField="vigenciaHasta" caption="Vigencia" [width]="140"></dxi-column>
        <dxi-column alignment="center" dataField="numeroContrato" caption="Contrato" [width]="140"></dxi-column>
        <dxi-column alignment="center" dataField="arrendatario" caption="Arrendatario" [minWidth]="220"></dxi-column>
        <dxi-column alignment="center" dataField="correoContacto" caption="Correo" [minWidth]="220"></dxi-column>
        <dxi-column alignment="center" dataField="telefonoContacto" caption="Teléfono" [width]="150"></dxi-column>
        <dxi-column alignment="center" dataField="arrendador" caption="Arrendador" [minWidth]="220"></dxi-column>
        <div *dxTemplate="let row of 'acciones'" class="d-flex gap-3 justify-content-center">
          <div *appHasPermission="'2'">
            <button valueExpr="id" id="actualizarButton" class="btnAcciones">
              <i class="fa fa-edit"></i>
            </button>
          </div>
          <div *appHasPermission="'4'">
            @if (row.data.estatus === 0) {
            <button id="pinButton" class="btnAcciones">
              <i class="fa fa-arrow-up"></i>
            </button>
            } @else {
            <button id="deleteButton" class="btnAcciones">
              <i class="fa fa-arrow-down"></i>
            </button>
            }
          </div>
        </div>
      </dx-data-grid>
    </div>
  </div>
</div>
