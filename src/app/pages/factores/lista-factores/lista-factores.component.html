<div [@routeAnimation] class="card card--panel perm-wrapper">
  <header class="perm-head" role="region" aria-label="Sección: Factores presupuestales">
    <div class="perm-head__icon" aria-hidden="true">
      <mat-icon>straighten</mat-icon>
    </div>

    <div class="perm-head__text">
      <span class="eyebrow">Sección</span>
      <h2>Factores Presupuestales</h2>
    </div>

    <nav class="perm-head__crumbs" aria-label="Ruta">
      <span class="crumb">Administración</span>
      <span class="sep">/</span>
      <span class="crumb">Factores Presupuestales</span>
      <span class="sep">/</span>
      <span class="crumb active">Consultar</span>
    </nav>
  </header>

  <div class="surface">
    <div class="row mt-3 g-3">
      <div class="col-12 col-lg-6">
        <div class="d-flex flex-wrap gap-10 mb-2 justify-content-end w-100">
          <div *appHasPermission="['47', '59']">
            <button (click)="agregarFactor()" mat-flat-button class="bg-secondary">
              <i class="fa fa-plus"></i> Agregar
            </button>
          </div>
          <button (click)="limpiarFactores()" mat-flat-button class="bg-success">
            <i class="fa fa-eraser"></i> Limpiar
          </button>
          <button (click)="toggleExpandFactores()" mat-flat-button class="bg-warn">
            <i [class]="autoExpandAllGroupsFactores ? 'fa fa-expand' : 'fa fa-compress'" aria-hidden="true"></i>
            {{ autoExpandAllGroupsFactores ? ' Contraer Grupos' : ' Expandir Grupos' }}
          </button>
        </div>
        <h5 class="mb-2">Factores</h5>
        <dx-data-grid
          #gridFactoresDemo
          id="gridFactores"
          [columnHidingEnabled]="false"
          [showBorders]="true"
          [showColumnLines]="true"
          [showRowLines]="true"
          [rowAlternationEnabled]="true"
          [dataSource]="listaFactoresDemo"
          [keyExpr]="'id'"
          [width]="'100%'"
          [remoteOperations]="{ paging: true }"
          [paging]="{ pageSize: pageSizeFactoresDemo }"
          [noDataText]="'Sin registros para mostrar'"
          [pager]="{
            showPageSizeSelector: true,
            allowedPageSizes: [10, 20, 50],
            showInfo: true,
            infoText: 'Página {0} de {1}',
            visible: true
          }"
          (onPageIndexChanged)="onPageIndexChangedFactoresDemo($event)"
          (onOptionChanged)="onFactoresDemoGridOptionChanged($event)"
        >
          <dxo-search-panel [visible]="true" [width]="200" placeholder="Buscar..."></dxo-search-panel>
          <dxo-group-panel [emptyPanelText]="mensajeAgrupar" [visible]="true"></dxo-group-panel>
          <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
          <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>
          <dxo-grouping [autoExpandAll]="autoExpandAllGroupsFactores"></dxo-grouping>
          <dxi-column
            caption="Acciones"
            cellTemplate="AccionesFactores"
            alignment="center"
            *appHasPermission="['46', '48', '58', '60']"
            dataType="string"
            [width]="120"
          ></dxi-column>
          <dxi-column dataField="variable" caption="Variable" alignment="center" dataType="string"></dxi-column>
          <dxi-column dataField="valor" caption="Valor" alignment="center" dataType="string"></dxi-column>
          <dxi-column dataField="descripcion" caption="Descripción" alignment="center" dataType="string"></dxi-column>
          <div *dxTemplate="let row of 'AccionesFactores'" class="d-flex gap-3 justify-content-center">
            <div *appHasPermission="['46', '58']">
              <button type="button" valueExpr="id" id="actualizarButton" class="btnAcciones" title="Editar" (click)="editarFormulaDemo(row.data)">
                <i class="fa fa-edit"></i>
              </button>
            </div>
            <div *appHasPermission="['48', '60']">
              <button type="button" id="deleteButton" class="btnAcciones" title="Eliminar" (click)="eliminarFormulaDemo(row.data)">
                <i class="fa fa-times"></i>
              </button>
            </div>
          </div>
          <dxo-export
            [enabled]="false"
            [allowExportSelectedData]="true"
            [texts]="{
              exportAll: 'Exportar todos los datos a Excel',
              exportSelectedRows: 'Exportar filas seleccionadas a Excel'
            }"
          >
          </dxo-export>
        </dx-data-grid>
      </div>
      <div class="col-12 col-lg-6">
        <div class="d-flex flex-wrap gap-10 mb-2 justify-content-end w-100">
          <div *appHasPermission="['47', '59']">
            <button (click)="agregarFormula()" mat-flat-button class="bg-secondary">
              <i class="fa fa-plus"></i> Agregar
            </button>
          </div>
          <button (click)="limpiarFormulas()" mat-flat-button class="bg-success">
            <i class="fa fa-eraser"></i> Limpiar
          </button>
          <button (click)="toggleExpandFormulas()" mat-flat-button class="bg-warn">
            <i [class]="autoExpandAllGroupsFormulas ? 'fa fa-expand' : 'fa fa-compress'" aria-hidden="true"></i>
            {{ autoExpandAllGroupsFormulas ? ' Contraer Grupos' : ' Expandir Grupos' }}
          </button>
        </div>
        <h5 class="mb-2">Fórmulas</h5>
        <dx-data-grid
          #gridFormulas
          id="gridFormulas"
          [columnHidingEnabled]="false"
          [showBorders]="true"
          [showColumnLines]="true"
          [showRowLines]="true"
          [rowAlternationEnabled]="true"
          [dataSource]="listaFormulasDemo"
          [keyExpr]="'id'"
          [width]="'100%'"
          [remoteOperations]="{ paging: true }"
          [paging]="{ pageSize: pageSizeFormulasDemo }"
          [noDataText]="'Sin registros para mostrar'"
          [pager]="{
            showPageSizeSelector: true,
            allowedPageSizes: [10, 20, 50],
            showInfo: true,
            infoText: 'Página {0} de {1}',
            visible: true
          }"
          (onPageIndexChanged)="onPageIndexChangedFormulasDemo($event)"
          (onOptionChanged)="onFormulasDemoGridOptionChanged($event)"
        >
          <dxo-search-panel [visible]="true" [width]="200" placeholder="Buscar..."></dxo-search-panel>
          <dxo-group-panel [emptyPanelText]="mensajeAgrupar" [visible]="true"></dxo-group-panel>
          <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
          <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>
          <dxo-grouping [autoExpandAll]="autoExpandAllGroupsFormulas"></dxo-grouping>
          <dxi-column
            caption="Acciones"
            cellTemplate="AccionesFormulas"
            alignment="center"
            *appHasPermission="['46', '48', '58', '60']"
            dataType="string"
            [width]="120"
          ></dxi-column>
          <dxi-column dataField="nombre" caption="Nombre" alignment="center" dataType="string"></dxi-column>
          <dxi-column dataField="formula" caption="Fórmula" alignment="center" dataType="string"></dxi-column>
          <div *dxTemplate="let row of 'AccionesFormulas'" class="d-flex gap-3 justify-content-center">
            <div *appHasPermission="['46', '58']">
              <button type="button" valueExpr="id" id="actualizarButton" class="btnAcciones" title="Editar" (click)="editarFormulaDemo(row.data)">
                <i class="fa fa-edit"></i>
              </button>
            </div>
            <div *appHasPermission="['48', '60']">
              <button type="button" id="deleteButton" class="btnAcciones" title="Eliminar" (click)="eliminarFormulaDemo(row.data)">
                <i class="fa fa-times"></i>
              </button>
            </div>
          </div>
          <dxo-export
            [enabled]="false"
            [allowExportSelectedData]="true"
            [texts]="{
              exportAll: 'Exportar todos los datos a Excel',
              exportSelectedRows: 'Exportar filas seleccionadas a Excel'
            }"
          >
          </dxo-export>
        </dx-data-grid>
      </div>
    </div>
  </div>
</div>
