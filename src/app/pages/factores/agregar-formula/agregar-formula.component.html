<div [@routeAnimation] class="card card--panel perm-wrapper">
  <header class="perm-head perm-head--left" role="region" aria-label="Sección: Fórmulas">
    <div class="perm-head__icon" aria-hidden="true">
      <mat-icon>functions</mat-icon>
    </div>
    <div class="perm-head__text">
      <span class="eyebrow">Sección</span>
      <h2>{{ title }}</h2>
    </div>
    <nav class="perm-head__crumbs" aria-label="Ruta">
      <span class="crumb">Administración</span>
      <span class="sep">/</span>
      <span class="crumb active">Fórmulas</span>
    </nav>
  </header>
  <div class="surface">
    <section class="perm-form-nc container-fluid py-4">
      <form [formGroup]="formulaForm" class="perm-form-body">
        <div class="row g-4">
          <div class="col-6">
            <label for="forNombre" class="form-label perm-label">Nombre</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">title</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="nombre"
                  class="form-control"
                  id="forNombre"
                  placeholder="Ej.: Fórmula de incremento"
                  required
                />
                <label for="forNombre">Nombre mostrado en el grid</label>
              </div>
            </div>
          </div>
          <div class="col-6">
            <label for="forFormula" class="form-label perm-label">Fórmula</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">calculate</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="formula"
                  class="form-control"
                  id="forFormula"
                  placeholder="((inpcActual/inpcAnterior)-uno)*cien"
                  required
                />
                <label for="forFormula">Expresión de cálculo mostrada en el grid</label>
              </div>
            </div>
          </div>
        </div>
        <div class="d-flex flex-wrap gap-3 justify-content-start mt-4">
          <button class="button-success" role="button" (click)="submit()">
            <i class="fa fa-check"></i>&nbsp;&nbsp;{{ submitButton }}
          </button>
          <button type="button" class="button-danger" (click)="regresar()">
            <i class="fa fa-times">&nbsp;&nbsp;</i>Cancelar
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
