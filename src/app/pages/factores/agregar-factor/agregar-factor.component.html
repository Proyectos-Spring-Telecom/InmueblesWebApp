<div [@routeAnimation] class="card card--panel perm-wrapper">
  <header class="perm-head perm-head--left" role="region" aria-label="Sección: Factores">
    <div class="perm-head__icon" aria-hidden="true">
      <mat-icon>straighten</mat-icon>
    </div>
    <div class="perm-head__text">
      <span class="eyebrow">Sección</span>
      <h2>{{ title }}</h2>
    </div>
    <nav class="perm-head__crumbs" aria-label="Ruta">
      <span class="crumb">Administración</span>
      <span class="sep">/</span>
      <span class="crumb active">Factores</span>
    </nav>
  </header>
  <div class="surface">
    <section class="perm-form-nc container-fluid py-4">
      <form [formGroup]="factorForm" class="perm-form-body">
        <div class="row g-4">
          <div class="col-12 col-md-6">
            <label for="facNombre" class="form-label perm-label">Nombre</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">title</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="nombre"
                  class="form-control"
                  id="facNombre"
                  placeholder="Ej.: Factor regional"
                  required
                />
                <label for="facNombre">Ej.: Factor zona financiera</label>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <label for="facValor" class="form-label perm-label">Valor</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">pin</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="number"
                  formControlName="valor"
                  class="form-control"
                  id="facValor"
                  placeholder="0"
                  min="0"
                  step="0.0001"
                />
                <label for="facValor">Según la unidad elegida (coef., m², etc.)</label>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <label for="facCategoria" class="form-label perm-label">Categoría</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">category</mat-icon>
              </span>
              <select class="form-select flex-grow-1" formControlName="categoria" id="facCategoria">
                <option value="" disabled>Seleccione…</option>
                <option value="UBICACION">Ubicación y entorno</option>
                <option value="SUPERFICIE">Superficie y descripción física</option>
                <option value="MERCADO">Mercado y demanda</option>
                <option value="USO_SUELO">Uso de suelo / normativa</option>
                <option value="OTRO">Otro</option>
              </select>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <label for="facUnidad" class="form-label perm-label">Unidad del valor</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">calculate</mat-icon>
              </span>
              <select class="form-select flex-grow-1" formControlName="unidad" id="facUnidad">
                <option value="" disabled>Seleccione…</option>
                <option value="COEFICIENTE">Coeficiente adimensional</option>
                <option value="POR_M2">Por metro cuadrado (m²)</option>
                <option value="PORCENTUAL">Porcentual (%)</option>
              </select>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <label for="facZona" class="form-label perm-label">Zona o mercado (opcional)</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">location_on</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="zonaReferencia"
                  class="form-control"
                  id="facZona"
                  placeholder="Colonia, corredor, plaza…"
                  maxlength="200"
                />
                <label for="facZona">Referencia geográfica o de mercado</label>
              </div>
            </div>
          </div>
          <div class="col-12">
            <label for="facDescripcion" class="form-label perm-label">Descripción (opcional)</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">notes</mat-icon>
              </span>
              <input
                type="text"
                formControlName="descripcion"
                class="form-control"
                id="facDescripcion"
                placeholder="Criterios de aplicación del factor en rentas o avalúos…"
              />
            </div>
          </div>
        </div>
        <div class="d-flex flex-wrap gap-3 justify-content-start mt-4">
          <button class="button-success" role="button" (click)="submit()">
            <i class="fa fa-check"></i>&nbsp;&nbsp;{{ submitButton }}
          </button>
          <button type="button" class="button-danger" (click)="regresar()">
            <i class="fa fa-times">&nbsp;&nbsp;</i>Cancelar
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
