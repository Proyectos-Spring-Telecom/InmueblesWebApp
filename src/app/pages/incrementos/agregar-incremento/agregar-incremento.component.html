<div [@routeAnimation] class="card card--panel perm-wrapper">
  <header class="perm-head perm-head--left" role="region" aria-label="Sección: INPC">
    <div class="perm-head__icon" aria-hidden="true">
      <mat-icon>receipt_long</mat-icon>
    </div>
    <div class="perm-head__text">
      <span class="eyebrow">Sección</span>
      <h2>{{ title }}</h2>
    </div>
    <nav class="perm-head__crumbs" aria-label="Ruta">
      <span class="crumb">Administración</span>
      <span class="sep">/</span>
      <span class="crumb">INPC</span>
      <span class="sep">/</span>
      <span class="crumb active">Consultar Histórico</span>
    </nav>
  </header>
  <div class="surface">
    <section class="perm-form-nc container-fluid py-4">
      <form [formGroup]="incrementoForm" class="perm-form-body">
        <div class="row g-4">
          <div class="col-12 col-md-4">
            <label for="incAnio" class="form-label perm-label">Año</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">calendar_today</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="number"
                  formControlName="anio"
                  class="form-control"
                  id="incAnio"
                  placeholder="Año"
                  min="1990"
                  max="2040"
                  step="1"
                  required
                />
                <label for="incAnio">Ej.: 2017</label>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-4">
            <label for="incMes" class="form-label perm-label">Mes</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">event</mat-icon>
              </span>
              <select class="form-select flex-grow-1" formControlName="mes" id="incMes" required>
                <option value="" disabled>Seleccione…</option>
                <option *ngFor="let m of mesesOpciones" [value]="m">{{ m }}</option>
              </select>
            </div>
          </div>
          <div class="col-12 col-md-4">
            <label for="incValorInpc" class="form-label perm-label">INPC</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">calculate</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="number"
                  formControlName="valorInpc"
                  class="form-control"
                  id="incValorInpc"
                  placeholder="0.000"
                  min="0"
                  step="0.001"
                  required
                />
                <label for="incValorInpc">Valor del índice (ej.: 126.091)</label>
              </div>
            </div>
          </div>
        </div>
        <div class="d-flex flex-wrap gap-3 justify-content-start mt-4">
          <button class="button-success" role="button" (click)="submit()">
            <i class="fa fa-check"></i>&nbsp;&nbsp;{{ submitButton }}
          </button>
          <button type="button" class="button-danger" (click)="regresar()">
            <i class="fa fa-times">&nbsp;&nbsp;</i>Cancelar
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
