<div [@routeAnimation] class="card card--panel perm-wrapper">
  <header class="perm-head" role="region" aria-label="Sección: INPC">
    <div class="perm-head__icon" aria-hidden="true">
      <mat-icon>receipt_long</mat-icon>
    </div>

    <div class="perm-head__text">
      <span class="eyebrow">Sección</span>
      <h2>INPC</h2>
    </div>

    <nav class="perm-head__crumbs" aria-label="Ruta">
      <span class="crumb">Administración</span>
      <span class="sep">/</span>
      <span class="crumb">INPC</span>
      <span class="sep">/</span>
      <span class="crumb active">Consultar Histórico</span>
    </nav>
  </header>

  <div class="surface">
    <div class="d-flex flex-wrap gap-10 justify-content-end w-100">
      <div *appHasPermission="['47', '55']">
        <button (click)="agregarIncremento()" mat-flat-button class="bg-secondary">
          <i class="fa fa-plus"></i> Agregar INPC</button>
      </div>
      <button (click)="limpiarCampos()" mat-flat-button class="bg-success"><i class="fa fa-eraser"></i> Limpiar</button>
      <button (click)="toggleExpandGroups()" mat-flat-button class="bg-warn">
        <i [class]="autoExpandAllGroups ? 'fa fa-expand' : 'fa fa-compress'" aria-hidden="true"></i>
        {{ autoExpandAllGroups ? ' Contraer Grupos' : ' Expandir Grupos' }}
      </button>
    </div>
    <div class="mt-3">
      <dx-data-grid
        #gridContainer
        id="gridIncrementos"
        [columnHidingEnabled]="false"
        [showBorders]="true"
        [showColumnLines]="true"
        [showRowLines]="true"
        [rowAlternationEnabled]="true"
        [dataSource]="listaIncrementos"
        [keyExpr]="'id'"
        [width]="'100%'"
        [remoteOperations]="{ paging: true }"
        [paging]="{ pageSize: pageSize }"
        [noDataText]="'Sin registros para mostrar'"
        [pager]="{
          showPageSizeSelector: true,
          allowedPageSizes: [10, 20, 50],
          showInfo: true,
          showNavigationButtons: true,
          visible: true
        }"
        (onPageIndexChanged)="onPageIndexChanged($event)"
        (onOptionChanged)="onGridOptionChanged($event)"
      >
        <dxo-search-panel [visible]="true" [width]="240" placeholder="Buscar..."></dxo-search-panel>
        <dxo-group-panel [emptyPanelText]="mensajeAgrupar" [visible]="true"></dxo-group-panel>
        <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
        <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>
        <dxo-grouping #expand [autoExpandAll]="autoExpandAllGroups"></dxo-grouping>
        <dxi-column
          caption="Acciones"
          cellTemplate="Acciones"
          alignment="center"
          *appHasPermission="['46', '48', '54', '56']"
          dataType="string"
          [width]="100"
        ></dxi-column>
        <dxi-column dataField="anio" caption="Año" alignment="center" dataType="number"></dxi-column>
        <dxi-column dataField="mes" caption="Mes" alignment="center" dataType="string"></dxi-column>
        <dxi-column
          dataField="valorInpc"
          caption="INPC"
          alignment="center"
          dataType="number"
          format=",##0.000"
        ></dxi-column>
        <div *dxTemplate="let row of 'Acciones'" class="d-flex gap-3 justify-content-center">
          <div *appHasPermission="['46', '54']">
            <button
              valueExpr="id" id="actualizarButton" class="btnAcciones"
              (click)="actualizarIncremento(row.data.id)"
            >
              <i class="fa fa-edit"></i>
            </button>
          </div>
        </div>
        <dxo-export
          [enabled]="true"
          [allowExportSelectedData]="true"
          [texts]="{
            exportAll: 'Exportar todos los datos',
            exportSelectedRows: 'Exportar filas seleccionadas'
          }"
        >
        </dxo-export>
      </dx-data-grid>
    </div>
  </div>
</div>
