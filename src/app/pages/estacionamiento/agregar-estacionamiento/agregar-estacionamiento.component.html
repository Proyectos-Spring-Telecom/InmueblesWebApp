<div [@routeAnimation] class="card card--panel perm-wrapper">
  <header class="perm-head perm-head--left" role="region" aria-label="Sección: Estacionamiento">
    <div class="perm-head__icon" aria-hidden="true">
      <mat-icon>local_parking</mat-icon>
    </div>
    <div class="perm-head__text">
      <span class="eyebrow">Sección</span>
      <h2>{{ title }}</h2>
    </div>
    <nav class="perm-head__crumbs" aria-label="Ruta">
      <span class="crumb">Operación</span>
      <span class="sep">/</span>
      <span class="crumb active">Estacionamiento</span>
    </nav>
  </header>

  <div class="surface">
    <section class="perm-form-nc container-fluid py-4">
      <form [formGroup]="estacionamientoForm" class="perm-form-body">
        <div class="row g-4">
          <div class="col-12 col-md-4">
            <label for="estNombrePensionado" class="form-label perm-label">Nombre del pensionado</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">badge</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="nombrePensionado"
                  class="form-control"
                  id="estNombrePensionado"
                  placeholder="Ej.: Juan Pérez"
                  required
                />
                <label for="estNombrePensionado">Ej.: Juan Pérez</label>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <label for="estNumeroTarjeta" class="form-label perm-label">Número de tarjeta</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">credit_card</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="numeroTarjeta"
                  class="form-control"
                  id="estNumeroTarjeta"
                  placeholder="Ej.: TAR-1001"
                  required
                />
                <label for="estNumeroTarjeta">Ej.: TAR-1001</label>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <label for="estArrendatario" class="form-label perm-label">Arrendatario</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">person</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="arrendatario"
                  class="form-control"
                  id="estArrendatario"
                  placeholder="Ej.: Santory"
                  required
                />
                <label for="estArrendatario">Ej.: Santory</label>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex flex-wrap gap-3 justify-content-start mt-4">
          <button class="button-success" role="button" (click)="submit()">
            <i class="fa fa-check"></i>&nbsp;&nbsp;{{ submitButton }}
          </button>
          <button type="button" class="button-danger" (click)="cancelar()">
            <i class="fa fa-times">&nbsp;&nbsp;</i>Cancelar
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
