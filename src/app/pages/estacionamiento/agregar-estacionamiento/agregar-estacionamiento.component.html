<div [@routeAnimation] class="card card--panel perm-wrapper">
  <header class="perm-head perm-head--left" role="region" aria-label="Sección: Estacionamiento">
    <div class="perm-head__icon" aria-hidden="true">
      <mat-icon>local_parking</mat-icon>
    </div>
    <div class="perm-head__text">
      <span class="eyebrow">Sección</span>
      <h2>{{ title }}</h2>
    </div>
    <nav class="perm-head__crumbs" aria-label="Ruta">
      <span class="crumb">Operación</span>
      <span class="sep">/</span>
      <span class="crumb active">Estacionamiento</span>
    </nav>
  </header>

  <div class="surface">
    <section class="perm-form-nc container-fluid py-4">
      <form [formGroup]="estacionamientoForm" class="perm-form-body">
        <div class="row g-4">
          <div class="col-12 col-md-4">
            <label for="estNombrePensionado" class="form-label perm-label">Nombre del pensionado</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">badge</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="nombrePensionado"
                  class="form-control"
                  id="estNombrePensionado"
                  placeholder="Ej.: Juan Pérez"
                  required
                />
                <label for="estNombrePensionado">Ej.: Juan Pérez</label>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <label for="estNumeroTarjeta" class="form-label perm-label">Número de tarjeta</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">credit_card</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="numeroTarjeta"
                  class="form-control"
                  id="estNumeroTarjeta"
                  placeholder="Ej.: TAR-1001"
                  required
                />
                <label for="estNumeroTarjeta">Ej.: TAR-1001</label>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <label for="estArrendatario" class="form-label perm-label">Arrendatario</label>
            <div class="input-group input-group-lg perm-ig">
              <span class="input-group-text fw-bold">
                <mat-icon aria-hidden="true">person</mat-icon>
              </span>
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  formControlName="arrendatario"
                  class="form-control"
                  id="estArrendatario"
                  placeholder="Ej.: Santory"
                  required
                />
                <label for="estArrendatario">Ej.: Santander</label>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex flex-wrap gap-3 justify-content-start mt-4">
          <button class="button-success" role="button" (click)="submit()">
            <i class="fa fa-check"></i>&nbsp;&nbsp;{{ submitButton }}
          </button>
          <button type="button" class="button-danger est-grid-toolbar__btn" (click)="cancelar()">
            <i class="fa fa-times">&nbsp;&nbsp;</i>Cancelar
          </button>
        </div>
      </form>

      <div class="est-vista-previa-grid mt-4 pt-4 border-top border-secondary border-opacity-25">
        <div class="est-grid-head mb-2">
          <h6 class="form-section-head est-grid-head__title mb-0">
            Estacionamiento de Inmueble:<span *ngIf="nombreInmuebleParaTitulo"> {{ nombreInmuebleParaTitulo }}</span>
          </h6>
          <div class="est-grid-toolbar">
            <button type="button" (click)="limpiarCamposGrid()" mat-flat-button class="bg-warning est-grid-toolbar__btn">
              <i class="fa fa-retweet"></i> Entradas y Salidas
            </button>
            <button type="button" (click)="limpiarCamposGrid()" mat-flat-button class="bg-success est-grid-toolbar__btn">
              <i class="fa fa-eraser"></i> Limpiar
            </button>
            <button type="button" (click)="toggleExpandGroups()" mat-flat-button class="bg-warn est-grid-toolbar__btn">
              <i [class]="autoExpandAllGroups ? 'fa fa-expand' : 'fa fa-compress'" aria-hidden="true"></i>
              {{ autoExpandAllGroups ? ' Contraer Grupos' : ' Expandir Grupos' }}
            </button>
          </div>
        </div>
        <div class="mt-3">
          <dx-data-grid
            #gridEstacionamiento
            id="gridEstacionamientoEst"
            [columnHidingEnabled]="true"
            [showBorders]="true"
            [showColumnLines]="true"
            [showRowLines]="true"
            [rowAlternationEnabled]="true"
            [noDataText]="'Sin registros para mostrar'"
            [dataSource]="filasEstacionamientosGrid"
            [keyExpr]="'id'"
            [width]="'100%'"
            [remoteOperations]="false"
            [paging]="{ pageSize: pageSize }"
            [pager]="{
              showPageSizeSelector: true,
              allowedPageSizes: [50],
              showInfo: true,
              infoText: 'Página {0} de {1}',
              visible: true
            }"
            (onPageIndexChanged)="onPageIndexChanged($event)"
            (onOptionChanged)="onGridOptionChanged($event)"
          >
            <dxo-search-panel [visible]="true" [width]="200" placeholder="Buscar..."></dxo-search-panel>
            <dxo-toolbar>
              <dxi-item name="groupPanel" location="before"></dxi-item>
              <dxi-item
                name="exportButton"
                location="after"
                [options]="{ text: 'Exportar Grid', icon: 'export' }"
                [showText]="'always'"
              ></dxi-item>
              <dxi-item name="searchPanel" location="after"></dxi-item>
            </dxo-toolbar>
            <dxo-pager
              [showPageSizeSelector]="true"
              [allowedPageSizes]="[100]"
              [showInfo]="true"
            ></dxo-pager>
            <dxo-group-panel [emptyPanelText]="mensajeAgrupar" [visible]="true"></dxo-group-panel>
            <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
            <dxo-grouping #expand [autoExpandAll]="autoExpandAllGroups"></dxo-grouping>
            <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>
            <dxi-column
              dataField="nombrePensionado"
              caption="Nombre del pensionado"
              alignment="center"
              dataType="string"
              [allowSearch]="true"
            ></dxi-column>
            <dxi-column
              dataField="numeroTarjeta"
              caption="Número de tarjeta"
              alignment="center"
              dataType="string"
              [allowSearch]="true"
            ></dxi-column>
            <dxi-column
              dataField="arrendatario"
              caption="Arrendatario"
              alignment="center"
              dataType="string"
              [allowSearch]="true"
            ></dxi-column>
            <dxo-export
              [enabled]="false"
              [allowExportSelectedData]="false"
              [texts]="{ exportAll: 'Exportar todos los datos a Excel' }"
            ></dxo-export>
          </dx-data-grid>
        </div>
      </div>
    </section>
  </div>
</div>
