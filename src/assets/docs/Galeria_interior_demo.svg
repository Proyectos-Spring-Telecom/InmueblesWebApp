<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141a21"/>
      <stop offset="1" stop-color="#2a1f33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b43a5d" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="80" y="96" width="1040" height="608" rx="26" fill="#0f1520" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
  <rect x="80" y="96" width="1040" height="10" rx="5" fill="url(#accent)"/>

  <circle cx="980" cy="250" r="160" fill="#f59e0b" opacity="0.12" filter="url(#soft)"/>
  <circle cx="270" cy="610" r="160" fill="#b43a5d" opacity="0.14" filter="url(#soft)"/>

  <text x="130" y="210" fill="rgba(255,255,255,0.82)" font-family="Segoe UI, Roboto, Arial" font-size="18" letter-spacing="3">
    EXPEDIENTE · INMUEBLE
  </text>
  <text x="130" y="280" fill="#ffffff" font-family="Segoe UI, Roboto, Arial" font-size="54">
    Imagen 1 (Galería)
  </text>
  <text x="130" y="332" fill="rgba(255,255,255,0.74)" font-family="Segoe UI, Roboto, Arial" font-size="22">
    Imagen ficticia para pruebas de expediente.
  </text>

  <g transform="translate(130 410)">
    <rect x="0" y="0" width="520" height="190" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="28" y="62" fill="rgba(255,255,255,0.86)" font-family="Segoe UI, Roboto, Arial" font-size="20">
      Archivo
    </text>
    <text x="28" y="104" fill="#ffffff" font-family="Segoe UI, Roboto, Arial" font-size="28">
      Galeria_interior_demo.svg
    </text>
    <text x="28" y="146" fill="rgba(255,255,255,0.68)" font-family="Segoe UI, Roboto, Arial" font-size="18">
      Sustituir por imagen real cuando exista galería en backend.
    </text>
  </g>
</svg>
