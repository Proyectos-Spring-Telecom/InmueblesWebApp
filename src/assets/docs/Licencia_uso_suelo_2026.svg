  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="80" y="96" width="1040" height="608" rx="26" fill="#0f1520" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
  <rect x="80" y="96" width="1040" height="10" rx="5" fill="url(#accent)"/>

  <circle cx="980" cy="210" r="120" fill="#4f7cff" opacity="0.18" filter="url(#soft)"/>
  <circle cx="250" cy="640" r="150" fill="#b43a5d" opacity="0.14" filter="url(#soft)"/>

  <text x="130" y="210" fill="rgba(255,255,255,0.82)" font-family="Segoe UI, Roboto, Arial" font-size="18" letter-spacing="3">
